kind = "web"
previewPath = "/"
title = "XogsideIQ"
version = "1.0.0"
id = "artifacts/xogsideiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19243

[services.development]
run = "pnpm --filter @workspace/xogsideiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xogsideiq", "run", "build" ]
publicDir = "artifacts/xogsideiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19243"
BASE_PATH = "/"
